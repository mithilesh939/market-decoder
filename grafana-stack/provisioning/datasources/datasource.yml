apiVersion: 1

datasources:
  - name: QuantTimescale
    uid: quant-timescale
    type: postgres
    access: proxy
    url: timescaledb:5432
    database: quant
    user: quant
    isDefault: true
    editable: true
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
      maxOpenConns: 20
      maxIdleConns: 10
      connMaxLifetime: 14400
    secureJsonData:
      password: quant_dev_password
